<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>SerreVue · Page not found</title>
<meta name="theme-color" content="#F6F3EC" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=Fraunces:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --green1:#4FA86C; --green2:#3F8E5B; --green3:#2C6B43;
    --cream:#F6F3EC; --cream2:#EEE9DC;
    --ink:#1E2C24; --ink-dim:#5A6B62; --ink-dimmer:#8A968F;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;min-height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  .stage{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px;background:var(--cream)}

  /* brand lockup, top-left */
  .brand{position:absolute;top:48px;left:60px;display:flex;align-items:center;gap:13px;text-decoration:none}
  .brand .logo{width:38px;height:38px;display:block}
  .brand .wm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;letter-spacing:-.6px;color:var(--ink);line-height:1}
  .brand .wm .vue{font-family:'Fraunces',serif;font-style:italic;font-weight:500;color:var(--green3)}

  /* language toggle, top-right */
  .lang{position:absolute;top:50px;right:60px;display:flex;align-items:center;gap:4px;font-family:'Space Grotesk',sans-serif}
  .lang-btn{background:none;border:none;cursor:pointer;font:inherit;font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--ink-dimmer);padding:5px 9px;border-radius:8px;transition:color .15s,background .15s}
  .lang-btn:hover{color:var(--ink)}
  .lang-btn.active{color:var(--green3);background:rgba(44,107,67,.10)}
  .lang-sep{color:var(--ink-dimmer);font-size:12px}

  /* theme toggle, top-right under lang */
  .theme-toggle{position:absolute;top:92px;right:62px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;border-radius:9px;color:var(--ink-dimmer);transition:color .15s,background .15s}
  .theme-toggle:hover{color:var(--ink);background:rgba(30,44,36,.06)}
  .theme-toggle svg{width:18px;height:18px}
  .theme-toggle .sun{display:none}
  body.dark .theme-toggle .sun{display:block}
  body.dark .theme-toggle .moon{display:none}

  /* big code */
  .code{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(96px,22vw,180px);line-height:.92;letter-spacing:-4px;color:var(--ink)}
  .code .g{font-family:'Fraunces',serif;font-style:italic;font-weight:500;color:var(--green3)}
  .head{margin-top:18px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(22px,4vw,30px);letter-spacing:-.5px;color:var(--ink)}
  .sub{margin-top:14px;font-size:17px;line-height:1.55;color:var(--ink-dim);max-width:42ch}
  .home{margin-top:34px;display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;text-decoration:none;color:var(--cream);background:var(--green3);padding:13px 24px;border-radius:30px;transition:background .15s,transform .15s}
  .home:hover{background:#235638;transform:translateY(-1px)}
  .home .arw{transition:transform .15s}
  .home:hover .arw{transform:translateX(3px)}
  .note{margin-top:20px;font-size:13px;color:var(--ink-dimmer)}

  /* dark mode */
  body.dark .stage{background:radial-gradient(125% 135% at 50% 6%, #3C8757 0%, #2F7149 46%, #265B3B 100%)}
  body.dark .brand .wm{color:#F6F3EC}
  body.dark .brand .wm .vue{color:#CFE8D7}
  body.dark .brand .logo rect{fill:#F6F3EC}
  body.dark .brand .logo path{fill:url(#g)}
  body.dark .brand .logo circle{fill:#F6F3EC}
  body.dark .lang-btn{color:rgba(246,243,236,.6)}
  body.dark .lang-btn:hover{color:#F6F3EC}
  body.dark .lang-btn.active{color:#234E36;background:rgba(246,243,236,.92)}
  body.dark .lang-sep{color:rgba(246,243,236,.45)}
  body.dark .theme-toggle{color:rgba(246,243,236,.72)}
  body.dark .theme-toggle:hover{color:#F6F3EC;background:rgba(246,243,236,.12)}
  body.dark .code{color:#F6F3EC}
  body.dark .code .g{color:#A9D9B7}
  body.dark .head{color:#F6F3EC}
  body.dark .sub{color:rgba(246,243,236,.8)}
  body.dark .home{background:#F6F3EC;color:#234E36}
  body.dark .home:hover{background:#fff}
  body.dark .home .arw{color:#2C6B43}
  body.dark .note{color:rgba(246,243,236,.55)}

  @media (max-width:700px){
    .brand{top:30px;left:24px}
    .brand .logo{width:34px;height:34px}
    .brand .wm{font-size:23px}
    .lang{top:30px;right:22px}
    .theme-toggle{top:72px;right:24px}
  }
</style>
</head>
<body>
  <div class="stage">
    <!-- brand -->
    <a class="brand" href="/" aria-label="SerreVue home">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="SerreVue">
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#4FA86C"/><stop offset="0.55" stop-color="#3F8E5B"/><stop offset="1" stop-color="#2C6B43"/>
        </linearGradient></defs>
        <rect width="64" height="64" rx="14" fill="url(#g)"/>
        <svg x="11" y="10.5" width="42" height="42" viewBox="0 0 200 196" preserveAspectRatio="xMidYMid meet">
          <path fill="#F6F3EC" d="M 140 10 C 166 40, 182 70, 176 108 C 170 142, 144 162, 108 158 C 99 159, 90 157, 82 153 C 76 162, 65 173, 55 181 C 51 184, 45 183, 46 177 C 48 169, 57 159, 67 150 C 50 140, 30 116, 27 86 C 23 50, 58 22, 96 16 C 112 13, 128 12, 140 10 Z"/>
          <circle fill="#2C6B43" cx="72" cy="90" r="13"/><circle fill="#2C6B43" cx="102" cy="90" r="13"/><circle fill="#2C6B43" cx="132" cy="90" r="13"/>
        </svg>
      </svg>
      <span class="wm">Serre<span class="vue">Vue</span></span>
    </a>

    <!-- language toggle -->
    <div class="lang" role="group" aria-label="Language">
      <button class="lang-btn active" data-lang="en">EN</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>
    <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>

    <div class="code">4<span class="g">0</span>4</div>
    <div class="head" data-en="This page wandered off." data-fr="Cette page s'est égarée.">This page wandered off.</div>
    <p class="sub" data-en="The link is broken or the page has moved. Let's get you back to the greenhouse." data-fr="Le lien est rompu ou la page a été déplacée. Retournons à la serre.">The link is broken or the page has moved. Let's get you back to the greenhouse.</p>
    <a class="home" href="/"><span data-en="Back to home" data-fr="Retour à l'accueil">Back to home</span> <span class="arw">&rarr;</span></a>
    <div class="note" data-en="Redirecting you home in a moment..." data-fr="Redirection vers l'accueil dans un instant...">Redirecting you home in a moment...</div>
  </div>

  <script>
    (function(){
      function setLang(l){
        document.documentElement.lang = l;
        document.querySelectorAll('[data-en]').forEach(function(el){
          var v = (l === 'fr') ? el.getAttribute('data-fr') : el.getAttribute('data-en');
          if (v !== null) el.textContent = v;
        });
        document.querySelectorAll('.lang-btn').forEach(function(b){
          b.classList.toggle('active', b.getAttribute('data-lang') === l);
        });
      }
      document.querySelectorAll('.lang-btn').forEach(function(b){
        b.addEventListener('click', function(){ setLang(b.getAttribute('data-lang')); });
      });
      setLang((navigator.language||'en').slice(0,2) === 'fr' ? 'fr' : 'en');
    })();
    (function(){
      var KEY='serrevue-theme';
      var saved=null; try{ saved=localStorage.getItem(KEY); }catch(e){}
      var mq = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
      function apply(t){ document.body.classList.toggle('dark', t==='dark'); }
      function resolve(){
        if(saved==='dark'||saved==='light') return saved;
        return (mq && mq.matches) ? 'dark' : 'light';
      }
      apply(resolve());
      document.querySelectorAll('.theme-toggle').forEach(function(b){
        b.addEventListener('click', function(){
          var t = document.body.classList.contains('dark') ? 'light' : 'dark';
          saved = t; try{ localStorage.setItem(KEY, t); }catch(e){}
          apply(t);
        });
      });
    })();
    (function(){
      // auto-bounce home after a short branded moment; cancel if the user interacts
      var cancelled = false;
      ['click','keydown','touchstart','wheel'].forEach(function(ev){
        document.addEventListener(ev, function(){ cancelled = true; }, {once:true, passive:true});
      });
      setTimeout(function(){ if(!cancelled){ location.replace('/'); } }, 4000);
    })();
  </script>
</body>
</html>
